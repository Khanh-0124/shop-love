<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu yêu tim</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Canvas tạo hiệu ứng chữ rơi mượt -->
    <canvas id="loveRainCanvas"></canvas>

    <button class="qr-toggle" type="button" aria-controls="qrPanel" aria-expanded="false">QR</button>
    <section class="qr-panel" id="qrPanel" aria-label="Mã QR chia sẻ">
        <div class="qr-panel__header">
            <h1>Mã QR</h1>
            <button class="qr-panel__close" type="button" aria-label="Đóng">×</button>
        </div>
        <canvas class="qr-canvas" id="qrCanvas" width="280" height="280"></canvas>
        <form class="qr-form" id="qrForm">
            <input id="qrUrlInput" type="url" inputmode="url" autocomplete="url" placeholder="https://..." aria-label="Link chia sẻ">
            <button type="submit">Tạo</button>
        </form>
        <p class="qr-status" id="qrStatus" aria-live="polite"></p>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
