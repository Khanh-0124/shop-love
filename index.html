<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu yêu tim</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Màn hình chào để vượt qua chính sách Autoplay -->
    <div id="welcomeOverlay" class="welcome-overlay">
        <div class="welcome-card">
            <h1 class="welcome-title">Gửi người tôi thương ✨</h1>
            <p class="welcome-subtitle">Có một điều bất ngờ dành cho bạn ở bên trong...</p>
            <button id="startPlayButton" class="welcome-btn" type="button">
                <span class="heart-pulse">💖</span> Mở ra xem nhé
            </button>
        </div>
    </div>

    <!-- Canvas tạo hiệu ứng chữ rơi mượt -->
    <canvas id="loveRainCanvas"></canvas>

    <!-- Script cấu hình Cloudinary -->
    <script src="cloudinary-config.js"></script>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script src="script.js"></script>
</body>
</html>
