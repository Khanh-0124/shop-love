<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin ảnh yêu thương</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="admin-shell">
        <header class="admin-header">
            <div>
                <p class="eyebrow">Love Rain Admin</p>
                <h1>Quản lý bộ ảnh theo user</h1>
            </div>
            <a class="preview-link" id="previewLink" href="index.html" target="_blank">Xem màn hình</a>
        </header>

        <section class="admin-grid">
            <aside class="users-panel">
                <form class="user-form" id="userForm">
                    <label for="userName">Tên user</label>
                    <div class="user-form__row">
                        <input id="userName" type="text" autocomplete="off" placeholder="Ví dụ: Linh">
                        <button type="submit">Thêm</button>
                    </div>
                </form>

                <div class="user-list" id="userList" aria-label="Danh sách user"></div>
            </aside>

            <section class="gallery-panel">
                <div class="gallery-header">
                    <div>
                        <p class="eyebrow">Bộ ảnh</p>
                        <h2 id="activeUserTitle">Default</h2>
                        <!-- Khung hiển thị link chia sẻ riêng biệt -->
                        <div class="share-link-container" id="shareLinkContainer" style="margin-top: 6px; font-size: 14px; display: none; align-items: center; gap: 8px;">
                            <span style="color: rgba(255, 248, 253, 0.6);">Link chia sẻ:</span>
                            <a id="shareLink" href="#" target="_blank" style="color: #ff4dbe; text-decoration: underline; font-weight: 700; word-break: break-all;"></a>
                            <button id="copyLinkButton" type="button" style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 700;">Copy</button>
                        </div>
                    </div>
                    <button class="danger-button" id="deleteUserButton" type="button">Xóa user</button>
                </div>

                <form class="music-form" id="musicForm">
                    <label for="musicUrl">Direct audio URL của user</label>
                    <div class="music-form__row">
                        <input id="musicUrl" type="url" inputmode="url" placeholder="https://.../music.mp3">
                        <button type="submit">Lưu nhạc</button>
                    </div>
                </form>

                <label class="audio-upload" for="audioInput">
                    <input id="audioInput" type="file" accept="audio/*">
                    <span>Hoặc chọn file nhạc để phát chắc chắn</span>
                </label>

                <form class="music-form" id="messageForm">
                    <label for="messageInput">Câu chữ rơi tùy chọn của user (nếu không nhập sẽ dùng mặc định)</label>
                    <div class="music-form__row">
                        <input id="messageInput" type="text" placeholder="Ví dụ: Thương em nhiều lắm">
                        <button type="submit">Thêm chữ</button>
                    </div>
                </form>
                <div class="message-tags" id="messageTags"></div>

                <label class="upload-zone" for="imageInput">
                    <input id="imageInput" type="file" accept="image/*" multiple>
                    <span>Chọn ảnh để thêm vào user này</span>
                </label>

                <form class="music-form" id="imageUrlForm">
                    <label for="imageUrlInput">Hoặc dán URL ảnh để tải lên Cloudinary</label>
                    <div class="music-form__row">
                        <input id="imageUrlInput" type="url" inputmode="url" placeholder="https://.../image.jpg">
                        <button type="submit">Tải ảnh</button>
                    </div>
                </form>

                <p class="admin-status" id="adminStatus" aria-live="polite"></p>
                <div class="image-grid" id="imageGrid"></div>
            </section>
        </section>
    </main>

    <!-- Script cấu hình Cloudinary -->
    <script src="cloudinary-config.js"></script>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script src="admin.js"></script>
</body>
</html>
